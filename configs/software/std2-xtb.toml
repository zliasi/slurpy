# std2 in xtb mode: xtb4stda builds the wavefunction from a geometry,
# std2 computes the spectrum, no DFT calculation needed.
# usage: slurpy std2-xtb mol.xyz
#        slurpy std2-xtb mol.xyz --args "-e 10"

[software]
extensions = [".xyz", ".coord"]

[resources]
cpus = 4
memory_gb = 4

[paths]
std2 = "/path/to/std2/bin/std2"
xtb4stda = "/path/to/xtb4stda/bin/xtb4stda"
xtb4stda_home = "/path/to/xtb4stda"

[environment]
setup = """
module purge
export XTB4STDAHOME="{xtb4stda_home}"
export OMP_NUM_THREADS={cpus}
export OMP_STACKSIZE=4G
ulimit -s unlimited
"""

[execution]
command = '''
"{xtb4stda}" "{input}" > "{output_dir}/{stem}-xtb4stda.out"
"{std2}" -xtb -e 7.0 {args} > "{output_dir}/{stem}.out"
cp tda.dat "{output_dir}/{stem}-tda.dat" 2>/dev/null || true
'''
scratch = true
archive = true
