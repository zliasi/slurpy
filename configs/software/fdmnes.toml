# fdmnes x-ray spectroscopy (parallel binary). set [paths] for your cluster.
# usage: slurpy fdmnes input/CeS8_inp.txt
#        slurpy fdmnes input/*_inp.txt      (array, one calculation per task)
# pass the calculation inputs themselves, never the fdmfile.txt master
# list. fdmnes reads a fixed-name fdmfile.txt from its working directory,
# so each job mirrors the whole submission directory into scratch (keeping
# relative references like cif files working), writes a one-entry
# fdmfile.txt, runs, and copies new files back to output/.
# serial binary: slurpy fdmnes-serial (or slurpy fdmnes --variant serial).

[software]
extensions = [".txt"]

[resources]
# the parallel binary scales with mpi ranks, one cpu each.
ntasks = 4
cpus = 1
memory_gb = 24

[paths]
fdmnes_dir = "/path/to/fdmnes-parallel"

[environment]
setup = """
module purge
# fdmnes ships its own intel mpi runtime.
. "{fdmnes_dir}/mpirt/bin/intel64/mpivars.sh"
"""

[execution]
command = '''
rm -f "$input"
rsync -a --exclude=output --exclude=.slurpy-staged --exclude=fdmfile.txt "$SLURM_SUBMIT_DIR/" .
printf '1\n\n%s\n' "$input_path" > fdmfile.txt
"{fdmnes_dir}/mpirt/bin/intel64/mpirun" -np {ntasks} "{fdmnes_dir}/fdmnes_mpi_linux64" > "{output_dir}/{stem}.out"
rsync -a --exclude=fdmfile.txt --exclude=input --exclude=cif --exclude=analysis --exclude=output "$PWD/" "{output_dir}/"
'''
scratch = true
